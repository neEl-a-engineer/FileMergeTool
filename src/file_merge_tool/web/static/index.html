<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>File Merge Tool</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand-lockup">
          <p class="eyebrow" data-i18n="eyebrow">Local AI Artifact Salon</p>
          <h1 data-i18n="title">File Merge Tool</h1>
        </div>
        <div class="header-actions">
          <span id="health" class="status-pill">checking</span>
        </div>
      </header>

      <nav class="tab-bar" aria-label="Merge tools">
        <button class="tab-button is-active" type="button" data-kind="file-list" data-ext="json" data-i18n="tabFileList">
          構成リスト
        </button>
        <button class="tab-button" type="button" data-kind="text-merge" data-ext="json" data-i18n="tabText">
          テキスト
        </button>
        <button class="tab-button" type="button" data-kind="mail-merge" data-ext="json" data-i18n="tabMail">
          メール
        </button>
        <button class="tab-button" type="button" data-kind="powerpoint-merge" data-ext="pptx" data-i18n="tabPowerPoint">
          PowerPoint
        </button>
        <button class="tab-button" type="button" data-kind="excel-merge" data-ext="xlsx" data-i18n="tabExcel">
          Excel
        </button>
        <button class="tab-button" type="button" data-kind="word-merge" data-ext="docx" data-i18n="tabWord">
          Word
        </button>
        <button class="tab-button" type="button" data-kind="pdf-merge" data-ext="pdf" data-i18n="tabPdf">
          PDF
        </button>
        <button class="tab-button" type="button" data-kind="image-merge" data-ext="html" data-i18n="tabImage">
          画像
        </button>
        <button class="tab-button" type="button" data-kind="history" data-i18n="tabHistory">
          履歴
        </button>
        <button class="tab-button" type="button" data-kind="settings" data-i18n="tabSettings">
          設定
        </button>
      </nav>

      <section class="workspace-grid">
        <aside class="saved-panel">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="savedEyebrow">Preset</p>
            <h2 data-i18n="savedTitle">保存済み設定</h2>
          </div>
          <label class="field">
            <span data-i18n="savedSelect">設定一覧</span>
            <select id="saved-setting-select"></select>
          </label>
          <div class="button-row">
            <button class="secondary-button" id="load-setting" type="button" data-i18n="loadSetting">読込</button>
            <button class="secondary-button" id="delete-setting" type="button" data-i18n="deleteSetting">削除</button>
          </div>
        </aside>

        <section class="main-panel" id="job-panel">
          <div class="section-heading">
            <p class="eyebrow" id="active-kind-label">File list JSON</p>
            <h2 data-i18n="jobTitle">実行設定</h2>
          </div>

          <form id="job-form">
            <input id="kind" name="kind" type="hidden" value="file-list" />

            <div class="field-row">
              <label class="field">
                <span data-i18n="settingName">設定名</span>
                <input id="setting-name" name="settingName" placeholder="default" />
              </label>
              <label class="field">
                <span data-i18n="outputStem">出力ファイル名</span>
                <span class="suffix-input">
                  <input id="output-stem" name="outputStem" value="file-list" />
                  <span id="output-extension">.json</span>
                </span>
              </label>
            </div>

            <section class="format-panel is-hidden" id="image-output-options">
              <fieldset class="segmented-field">
                <legend data-i18n="imageOutputFormat">画像出力形式</legend>
                <div class="segmented-control image-format-control">
                  <label>
                    <input type="radio" name="image-output-mode" value="html" checked />
                    <span data-i18n="imageFormatHtml">HTML</span>
                  </label>
                  <label>
                    <input type="radio" name="image-output-mode" value="pptx" />
                    <span data-i18n="imageFormatPptx">PPTX</span>
                  </label>
                  <label>
                    <input type="radio" name="image-output-mode" value="both" />
                    <span data-i18n="imageFormatBoth">両方</span>
                  </label>
                </div>
              </fieldset>
            </section>

            <label class="field">
              <span data-i18n="outputDir">出力先フォルダ</span>
              <input id="output-dir" name="outputDir" value="80_workspace\history" readonly />
            </label>

            <label class="field">
              <span data-i18n="rootPath">収集対象ルートフォルダ</span>
              <input id="root-path" name="rootPath" placeholder="D:\WebServer" required />
            </label>

            <div class="field-row">
              <label class="field">
                <span data-i18n="excludeDirs">除外フォルダ</span>
                <textarea id="exclude-dirs" name="excludeDirs" rows="4">.git, .venv, __pycache__, node_modules</textarea>
              </label>
              <label class="field">
                <span data-i18n="excludeExts">除外拡張子</span>
                <textarea id="exclude-exts" name="excludeExts" rows="4">.png, .jpg, .jpeg, .gif, .zip, .exe, .dll</textarea>
              </label>
            </div>

            <div class="field-row">
              <label class="field">
                <span data-i18n="excludeFiles">除外ファイル名</span>
                <textarea id="exclude-files" name="excludeFiles" rows="4">Thumbs.db, desktop.ini</textarea>
              </label>
              <label class="field">
                <span data-i18n="additionalMarkers">追加機密分類判定文字列</span>
                <textarea id="additional-markers" name="additionalMarkers" rows="4"></textarea>
              </label>
            </div>

            <div class="action-bar">
              <button class="secondary-button" id="save-setting" type="button" data-i18n="saveSetting">設定を保存</button>
              <button class="primary-button" type="submit" data-i18n="runJob">実行</button>
            </div>
          </form>
        </section>

        <section class="main-panel is-hidden" id="settings-panel">
          <div class="section-heading">
            <p class="eyebrow">Global</p>
            <h2 data-i18n="settingsTitle">全体設定</h2>
          </div>

          <label class="field">
            <span data-i18n="globalMarkers">全体機密分類判定文字列</span>
            <textarea id="global-markers" rows="5">機密, 極秘</textarea>
          </label>

          <fieldset class="segmented-field">
            <legend data-i18n="language">言語</legend>
            <div class="segmented-control">
              <label>
                <input type="radio" name="language" value="ja" checked />
                <span>日本語</span>
              </label>
              <label>
                <input type="radio" name="language" value="en" />
                <span>English</span>
              </label>
            </div>
          </fieldset>

          <div class="action-bar">
            <button class="primary-button" id="save-global-settings" type="button" data-i18n="saveGlobalSettings">
              全体設定を保存
            </button>
          </div>
        </section>

        <section class="main-panel is-hidden" id="history-panel">
          <div class="section-heading">
            <p class="eyebrow">History</p>
            <h2 data-i18n="historyTitle">履歴</h2>
          </div>
          <div class="action-bar history-actions">
            <button class="secondary-button" id="refresh-history" type="button" data-i18n="refreshHistory">
              更新
            </button>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>

        <section class="result-panel">
          <div class="section-heading">
            <p class="eyebrow">Console</p>
            <h2 data-i18n="jobResult">実行結果</h2>
          </div>
          <pre id="job-output">No job yet.</pre>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
